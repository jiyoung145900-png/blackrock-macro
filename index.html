<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BLACKROCK PRO V9.9.2</title>
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --item: #252525; --point: #007bff; --text: #e0e0e0; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: var(--text); user-select: none; }
        
        .header { display: flex; align-items: center; padding: 12px; background: var(--panel); border-bottom: 1px solid #333; gap: 8px; }
        .search-input { flex: 1; background: #000; border: 1px solid #444; color: #00ff00; padding: 8px; border-radius: 4px; outline: none; font-size: 13px; }
        .add-input { flex: 2; background: #000; border: 1px solid var(--point); color: white; padding: 8px; border-radius: 4px; outline: none; font-size: 13px; }
        .menu-btn { background: #444; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; white-space: nowrap; }
        .btn-add { background: var(--point); }

        .container { padding: 12px; height: calc(100vh - 75px); overflow-y: auto; }
        .tab-bar { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
        .tab-btn { padding: 6px 14px; background: #333; border: none; color: #aaa; cursor: pointer; border-radius: 4px; font-size: 12px; }
        .tab-btn.active { background: var(--point); color: white; font-weight: bold; }

        #contextMenu { display: none; position: fixed; background: #2a2a2a; border: 1px solid #444; z-index: 2000; border-radius: 6px; padding: 5px 0; box-shadow: 0 4px 15px rgba(0,0,0,0.6); min-width: 140px; }
        #contextMenu div { padding: 10px 18px; cursor: pointer; font-size: 13px; color: white; transition: 0.1s; }
        #contextMenu div:hover { background: var(--point); }

        .macro-list { display: grid; grid-template-columns: 1fr; gap: 4px; }
        .macro-item { display: flex; align-items: center; background: var(--item); padding: 10px 15px; border-radius: 4px; border: 1px solid #2d2d2d; outline: none; }
        .macro-item:hover { border-color: var(--point); background: #2a2a2a; }
        /* 클릭된 문장 표시 (포커스 상태) */
        .macro-item:focus { border-color: #ffc107; background: #333; }
        
        .handle { color: #555; cursor: grab; margin-right: 12px; font-size: 18px; }
        .num { color: #666; width: 25px; font-weight: bold; font-size: 11px; }
        .macro-content { flex: 1; cursor: pointer; font-size: 14px; line-height: 1.4; }

        #toast { visibility: hidden; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #28a745; color: white; padding: 8px 20px; border-radius: 20px; font-size: 12px; z-index: 3000; }
        #toast.show { visibility: visible; animation: fadein 0.2s, fadeout 0.2s 0.7s; }
    </style>
</head>
<body>

<div id="toast">복사 완료!</div>
<div id="contextMenu"></div>

<div class="header">
    <input type="text" id="searchBox" class="search-input" placeholder="🔍 검색어..." onkeyup="render()">
    <input type="text" id="inpText" class="add-input" placeholder="새 문장 입력...">
    <button class="menu-btn btn-add" id="mainBtn" onclick="saveItem()">추가</button>
    <button class="menu-btn" style="background:#28a745;" onclick="exportData()">저장</button>
    <button class="menu-btn" style="background:#ffc107; color:black;" onclick="document.getElementById('importFile').click()">복원</button>
    <input type="file" id="importFile" style="display:none" onchange="importData(this)">
</div>

<div class="container">
    <div class="tab-bar" id="tabBar"></div>
    <div class="macro-list" id="list"></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('br_v99')) || { "인사": [{t:"안녕하세요, 블랙록 강노을입니다."}] };
    let curTab = Object.keys(db)[0];
    let editIdx = -1;
    let rightClickedTab = "";
    let selectedItemIdx = -1; // 현재 선택된 문장 인덱스 저장

    function render() {
        const list = document.getElementById('list');
        const tabBar = document.getElementById('tabBar');
        const search = document.getElementById('searchBox').value.toLowerCase();
        
        tabBar.innerHTML = Object.keys(db).map(t => 
            `<button class="tab-btn ${t===curTab?'active':''}" onclick="setTab('${t}')" oncontextmenu="showTabMenu(event, '${t}')">${t}</button>`
        ).join('');
        
        list.innerHTML = "";
        (db[curTab] || []).forEach((item, i) => {
            if(item.t.toLowerCase().includes(search)) {
                const div = document.createElement('div');
                div.className = 'macro-item';
                div.tabIndex = 0; // 키보드 포커스를 받기 위해 필요
                div.draggable = true;
                div.oncontextmenu = (e) => showItemMenu(e, i);
                
                // 클릭 시 현재 인덱스 저장 (삭제 대기)
                div.onclick = (e) => { 
                    selectedItemIdx = i; 
                    copy(item.t); // 클릭하면 복사도 같이 수행
                };

                div.innerHTML = `
                    <div class="handle">☰</div>
                    <div class="num">${i+1}.</div>
                    <div class="macro-content">${item.t}</div>
                `;
                
                // --- ⚡ Delete 키 감지 로직 ---
                div.onkeydown = (e) => {
                    if (e.key === "Delete" || e.key === "Del") {
                        delItem(i);
                    }
                };

                div.ondblclick = () => { editIdx = i; document.getElementById('inpText').value = item.t; document.getElementById('mainBtn').innerText = "수정"; document.getElementById('inpText').focus(); };
                
                div.addEventListener('dragstart', (e) => { e.dataTransfer.setData('idx', i); div.style.opacity = '0.4'; });
                div.addEventListener('dragover', (e) => e.preventDefault());
                div.addEventListener('drop', (e) => {
                    const from = e.dataTransfer.getData('idx');
                    const target = db[curTab].splice(from, 1)[0];
                    db[curTab].splice(i, 0, target);
                    saveDB(); render();
                });
                div.addEventListener('dragend', () => render());
                list.appendChild(div);
            }
        });
    }

    function copy(t) {
        const cleanText = t.trim().replace(/[\x00-\x1F\x7F-\x9F]/g, "");
        navigator.clipboard.writeText(cleanText).then(() => {
            const ts = document.getElementById('toast');
            ts.className = 'show';
            setTimeout(() => ts.className = '', 1000);
        });
    }

    function showTabMenu(e, tabName) {
        e.preventDefault(); e.stopPropagation();
        rightClickedTab = tabName;
        const menu = document.getElementById('contextMenu');
        menu.innerHTML = `<div onclick="addTabPrompt()">➕ 새 탭 추가</div><div onclick="editTabPrompt()">📝 이름 수정</div><div onclick="delTabConfirm()" style="color:#ff6b6b">❌ 삭제</div>`;
        displayMenu(e);
    }

    function showItemMenu(e, idx) {
        e.preventDefault(); e.stopPropagation();
        const menu = document.getElementById('contextMenu');
        menu.innerHTML = `<div onclick="editItemFromMenu(${idx})">📝 수정</div><div onclick="delItem(${idx})" style="color:#ff6b6b">❌ 삭제 (Del)</div>`;
        displayMenu(e);
    }

    function displayMenu(e) {
        const menu = document.getElementById('contextMenu');
        menu.style.display = 'block';
        menu.style.left = e.pageX + 'px';
        menu.style.top = e.pageY + 'px';
    }

    window.onclick = () => document.getElementById('contextMenu').style.display = 'none';

    function addTabPrompt() {
        const n = prompt("새 탭 이름?");
        if(n && !db[n]) { db[n] = []; curTab = n; saveDB(); render(); }
    }
    function editTabPrompt() {
        const n = prompt("이름 수정?", rightClickedTab);
        if(n && n !== rightClickedTab && !db[n]) { db[n] = db[rightClickedTab]; delete db[rightClickedTab]; curTab = n; saveDB(); render(); }
    }
    function delTabConfirm() {
        if(Object.keys(db).length > 1 && confirm(`탭 삭제할까요?`)) { delete db[rightClickedTab]; curTab = Object.keys(db)[0]; saveDB(); render(); }
    }

    function setTab(t) { curTab = t; render(); }

    function saveItem() {
        const t = document.getElementById('inpText').value.trim();
        if(!t) return;
        if(editIdx === -1) db[curTab].push({t:t});
        else { db[curTab][editIdx].t = t; editIdx = -1; document.getElementById('mainBtn').innerText = "추가"; }
        saveDB(); render(); document.getElementById('inpText').value = "";
    }

    function editItemFromMenu(idx) {
        editIdx = idx;
        document.getElementById('inpText').value = db[curTab][idx].t;
        document.getElementById('mainBtn').innerText = "수정";
        document.getElementById('inpText').focus();
    }

    document.getElementById('inpText').addEventListener('keypress', (e) => { if(e.key === 'Enter') saveItem(); });
    
    function delItem(i) {
        if(confirm("이 문장을 삭제할까요?")) {
            db[curTab].splice(i, 1);
            saveDB();
            render();
        }
    }

    function saveDB() { localStorage.setItem('br_v99', JSON.stringify(db)); }
    function exportData() {
        const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'blackrock_v9.json';
        a.click();
    }
    function importData(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function() {
            try {
                const importedData = JSON.parse(reader.result);
                if(confirm("데이터를 합칠까요?")) {
                    for(let k in importedData) { if(db[k]) db[k] = db[k].concat(importedData[k]); else db[k] = importedData[k]; }
                    saveDB(); render(); alert("완료!");
                }
            } catch(e) { alert("오류"); }
        };
        reader.readAsText(file);
    }
    render();
</script>
</body>
</html>
