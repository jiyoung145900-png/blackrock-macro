<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BLACKROCK PRO V10.5</title>
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --item: #252525; --point: #007bff; --text: #e0e0e0; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: var(--text); user-select: none; overflow: hidden; }
        
        /* 헤더 최소화 */
        .header { display: flex; align-items: center; padding: 6px 15px; background: var(--panel); border-bottom: 1px solid #333; gap: 10px; }
        .search-input { flex: 1; background: #000; border: 1px solid #444; color: #00ff00; padding: 5px 12px; border-radius: 4px; outline: none; font-size: 13px; }
        .btn-group { display: flex; gap: 4px; }
        .menu-btn { background: #333; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-main { background: var(--point) !important; }

        .container { padding: 8px 12px; height: calc(100vh - 45px); overflow-y: auto; }
        .tab-bar { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
        .tab-btn { padding: 4px 10px; background: #2a2a2a; border: none; color: #888; cursor: pointer; border-radius: 4px; font-size: 12px; }
        .tab-btn.active { background: var(--point); color: white; font-weight: bold; }

        .macro-list { display: grid; grid-template-columns: 1fr; gap: 2px; } /* 문장 사이 간격 최소화 */
        
        /* ⚡ 위아래 여백을 2px까지 줄여서 쫀쫀하게 만듦 */
        .macro-item { display: flex; align-items: flex-start; background: var(--item); padding: 4px 10px; border-radius: 3px; border: 1px solid #2d2d2d; outline: none; cursor: move; } 
        .macro-item:hover { border-color: var(--point); background: #2a2a2a; }
        .macro-item:focus { border-color: #ffc107; background: #333; }
        
        .num { color: #555; width: 20px; font-weight: bold; font-size: 11px; flex-shrink: 0; margin-top: 2px; }
        
        /* ⚡ [핵심] 여러 줄 다 보이게 설정 + 줄 간격 타이트하게 */
        .macro-content { 
            flex: 1; 
            cursor: pointer; 
            font-size: 14px; 
            line-height: 1.3; 
            white-space: normal; /* 단어 단위로 줄바꿈 허용 */
            word-break: break-all; /* 긴 영문/숫자도 줄바꿈 */
            display: block; /* 전체 내용 노출 */
        }

        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 5000; align-items: center; justify-content: center; }
        .modal { background: #1e1e1e; padding: 20px; border-radius: 8px; width: 450px; border: 1px solid var(--point); }
        .modal-input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 4px; outline: none; font-size: 14px; box-sizing: border-box; margin-bottom: 15px; }

        #contextMenu { display: none; position: fixed; background: #2a2a2a; border: 1px solid #444; z-index: 2000; border-radius: 6px; padding: 5px 0; min-width: 140px; }
        #contextMenu div { padding: 8px 15px; cursor: pointer; font-size: 13px; color: white; }
        #toast { visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--point); color: white; padding: 8px 20px; border-radius: 30px; font-size: 12px; z-index: 6000; }
        #toast.show { visibility: visible; animation: fadein 0.2s, fadeout 0.2s 0.7s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div id="toast">메신저로 발사!</div>
<div id="contextMenu"></div>

<div id="modalOverlay">
    <div class="modal">
        <div id="modalTitle" style="margin-bottom:10px; color:var(--point); font-weight:bold;">문장 관리</div>
        <textarea id="modalInp" class="modal-input" rows="8" placeholder="내용 입력..."></textarea>
        <div style="display:flex; justify-content:flex-end; gap:10px;">
            <button class="menu-btn" onclick="closeModal()">취소</button>
            <button class="menu-btn btn-main" onclick="saveItem()">확인</button>
        </div>
    </div>
</div>

<div class="header">
    <input type="text" id="searchBox" class="search-input" placeholder="🔍 검색어..." onkeyup="render()">
    <div class="btn-group">
        <button class="menu-btn" onclick="addTabPrompt()">탭+</button>
        <button class="menu-btn btn-main" onclick="openModal()">문장+</button>
        <button class="menu-btn" onclick="exportData()">저장</button>
        <button class="menu-btn" onclick="document.getElementById('importFile').click()">복원</button>
    </div>
    <input type="file" id="importFile" style="display:none" onchange="importData(this)">
</div>

<div class="container">
    <div class="tab-bar" id="tabBar"></div>
    <div class="macro-list" id="list"></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('br_v10')) || { "인사": [{t:"안녕하세요, 블랙록 강노을입니다."}] };
    let curTab = Object.keys(db)[0];
    let editIdx = -1;
    let rightClickedTab = "";

    function render() {
        const list = document.getElementById('list');
        const tabBar = document.getElementById('tabBar');
        const search = document.getElementById('searchBox').value.toLowerCase();
        
        tabBar.innerHTML = Object.keys(db).map(t => 
            `<button class="tab-btn ${t===curTab?'active':''}" onclick="setTab('${t}')" oncontextmenu="showTabMenu(event, '${t}')">${t}</button>`
        ).join('');
        
        list.innerHTML = "";
        (db[curTab] || []).forEach((item, i) => {
            if(item.t.toLowerCase().includes(search)) {
                const div = document.createElement('div');
                div.className = 'macro-item';
                div.tabIndex = 0;
                div.draggable = true;
                div.oncontextmenu = (e) => showItemMenu(e, i);
                div.onclick = () => { /* 선택 */ };
                div.ondblclick = () => { copy(item.t); };
                div.onkeydown = (e) => { if (e.key === "Delete" || e.key === "Del") delItem(i); };

                div.innerHTML = `<div class="num">${i+1}</div><div class="macro-content">${item.t}</div>`;
                
                div.addEventListener('dragstart', (e) => { e.dataTransfer.setData('idx', i); div.style.opacity = '0.4'; });
                div.addEventListener('dragover', (e) => e.preventDefault());
                div.addEventListener('drop', (e) => {
                    const from = e.dataTransfer.getData('idx');
                    const target = db[curTab].splice(from, 1)[0];
                    db[curTab].splice(i, 0, target);
                    saveDB(); render();
                });
                div.addEventListener('dragend', () => render());
                list.appendChild(div);
            }
        });
    }

    function copy(t) {
        const cleanText = t.trim().replace(/[\x00-\x1F\x7F-\x9F]/g, "");
        navigator.clipboard.writeText(cleanText).then(() => {
            const ts = document.getElementById('toast');
            ts.className = 'show';
            setTimeout(() => ts.className = '', 1000);
        });
    }

    function openModal(idx = -1) {
        editIdx = idx;
        const overlay = document.getElementById('modalOverlay');
        const input = document.getElementById('modalInp');
        overlay.style.display = 'flex';
        input.value = (idx === -1) ? "" : db[curTab][idx].t;
        input.focus();
    }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function saveItem() {
        const t = document.getElementById('modalInp').value.trim();
        if(!t) return;
        if(editIdx === -1) db[curTab].push({t:t});
        else db[curTab][editIdx].t = t;
        saveDB(); render(); closeModal();
    }
    document.getElementById('modalInp').addEventListener('keydown', (e) => {
        if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveItem(); }
    });

    function showTabMenu(e, tabName) {
        e.preventDefault(); e.stopPropagation();
        rightClickedTab = tabName;
        const menu = document.getElementById('contextMenu');
        menu.innerHTML = `<div onclick="editTabPrompt()">📝 이름 수정</div><div onclick="delTabConfirm()" style="color:#ff6b6b">❌ 탭 삭제</div>`;
        displayMenu(e);
    }
    function showItemMenu(e, idx) {
        e.preventDefault(); e.stopPropagation();
        const menu = document.getElementById('contextMenu');
        menu.innerHTML = `<div onclick="openModal(${idx})">📝 수정</div><div onclick="delItem(${idx})" style="color:#ff6b6b">❌ 삭제</div>`;
        displayMenu(e);
    }
    function displayMenu(e) {
        const menu = document.getElementById('contextMenu');
        menu.style.display = 'block'; menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
    }
    window.onclick = () => document.getElementById('contextMenu').style.display = 'none';

    function addTabPrompt() {
        const n = prompt("새 탭 이름?");
        if(n && !db[n]) { db[n] = []; curTab = n; saveDB(); render(); }
    }
    function editTabPrompt() {
        const n = prompt("탭 이름 수정?", rightClickedTab);
        if(n && n !== rightClickedTab && !db[n]) { db[n] = db[rightClickedTab]; delete db[rightClickedTab]; curTab = n; saveDB(); render(); }
    }
    function delTabConfirm() {
        if(Object.keys(db).length > 1 && confirm(`삭제할까요?`)) { delete db[rightClickedTab]; curTab = Object.keys(db)[0]; saveDB(); render(); }
    }
    function setTab(t) { curTab = t; render(); }
    function delItem(i) { if(confirm("삭제할까요?")) { db[curTab].splice(i, 1); saveDB(); render(); } }
    function saveDB() { localStorage.setItem('br_v10', JSON.stringify(db)); }
    function exportData() {
        const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'blackrock_v10.json'; a.click();
    }
    function importData(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function() {
            try {
                const importedData = JSON.parse(reader.result);
                if(confirm("합칠까요?")) {
                    for(let k in importedData) { if(db[k]) db[k] = db[k].concat(importedData[k]); else db[k] = importedData[k]; }
                    saveDB(); render();
                }
            } catch(e) { alert("오류"); }
        };
        reader.readAsText(file);
    }
    render();
</script>
</body>
</html>
