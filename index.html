<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>블랙록 강노을 상담 대시보드 V4</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background: #121212; color: #e0e0e0; }
        .tab-bar { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; cursor: pointer; background: #333; border: none; color: white; border-radius: 5px; transition: 0.2s; }
        .tab-btn.active { background: #007bff; font-weight: bold; box-shadow: 0 0 10px rgba(0,123,255,0.5); }
        .content-area { background: #1e1e1e; padding: 20px; border-radius: 10px; min-height: 400px; border: 1px solid #333; }
        
        /* 드래그 가능 아이템 스타일 */
        .macro-item { display: flex; align-items: center; background: #2d2d2d; padding: 12px; margin-bottom: 8px; border-radius: 5px; border: 1px solid #444; cursor: grab; transition: background 0.2s; }
        .macro-item:active { cursor: grabbing; }
        .macro-item.dragging { opacity: 0.5; background: #444; border: 1px dashed #007bff; }
        
        .handle { margin-right: 15px; color: #666; font-size: 20px; user-select: none; }
        .macro-text { flex: 1; padding: 5px; font-size: 15px; line-height: 1.4; }
        .btn-group { display: flex; gap: 6px; margin-left: 10px; }
        
        button { cursor: pointer; border: none; border-radius: 3px; padding: 8px 12px; font-weight: bold; }
        .copy-btn { background: #28a745; color: white; }
        .edit-btn { background: #ffc107; color: black; }
        .del-btn { background: #dc3545; color: white; }
        
        .admin-panel { margin-top: 25px; padding: 20px; background: #252525; border-radius: 10px; border: 1px dashed #555; }
        input { padding: 12px; background: #333; border: 1px solid #444; color: white; border-radius: 5px; }
        hr { border: 0.5px solid #333; margin: 20px 0; }
    </style>
</head>
<body>

    <h2>🏦 BLACKROCK 실전 상담 보드 (V4)</h2>

    <div class="tab-bar" id="tabBar"></div>

    <div class="content-area" id="macroList">
        </div>

    <div class="admin-panel">
        <strong>[탭 편집]</strong> <br><br>
        <input type="text" id="newTabName" placeholder="새 탭 이름">
        <button onclick="addTab()" style="background:#555; color:white;">탭 추가</button>
        <button onclick="deleteCurrentTab()" style="background:#721c24; color:white;">현재 탭 삭제</button>
        <hr>
        <strong>[문장 등록/수정]</strong><br><br>
        <input type="text" id="newText" style="width: 75%;" placeholder="문장 내용을 입력하세요...">
        <button onclick="addOrUpdateMacro()" id="addBtn" style="background:#007bff; color:white; padding:12px 20px;">저장하기</button>
    </div>

    <script>
        let macros = JSON.parse(localStorage.getItem('br_macros_v4')) || { "신규인사": ["안녕하세요, 블랙록 강노을입니다."] };
        let categories = Object.keys(macros);
        let currentTab = categories[0];
        let editIndex = -1;

        function init() {
            const tabBar = document.getElementById('tabBar');
            tabBar.innerHTML = categories.map(cat => 
                `<button class="tab-btn ${cat === currentTab ? 'active' : ''}" onclick="setTab('${cat}')">${cat}</button>`
            ).join('');
            renderMacros();
        }

        function setTab(cat) { currentTab = cat; editIndex = -1; document.getElementById('addBtn').innerText = "저장하기"; init(); }

        function renderMacros() {
            const list = document.getElementById('macroList');
            list.innerHTML = "";
            (macros[currentTab] || []).forEach((text, idx) => {
                const item = document.createElement('div');
                item.className = 'macro-item';
                item.draggable = true;
                item.dataset.index = idx;
                item.innerHTML = `
                    <div class="handle">☰</div>
                    <div class="macro-text" onclick="copyText('${text}')">${text}</div>
                    <div class="btn-group">
                        <button class="edit-btn" onclick="event.stopPropagation(); editMacro(${idx})">편집</button>
                        <button class="del-btn" onclick="event.stopPropagation(); deleteMacro(${idx})">삭제</button>
                    </div>
                `;
                
                // 드래그 이벤트 리스너 등록
                item.addEventListener('dragstart', dragStart);
                item.addEventListener('dragover', dragOver);
                item.addEventListener('drop', drop);
                item.addEventListener('dragend', dragEnd);
                
                list.appendChild(item);
            });
        }

        // 드래그 앤 드롭 로직
        let dragSrcIndex;

        function dragStart(e) {
            dragSrcIndex = this.dataset.index;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function dragOver(e) {
            e.preventDefault();
            return false;
        }

        function drop(e) {
            e.preventDefault();
            const targetIndex = this.dataset.index;
            if (dragSrcIndex !== targetIndex) {
                const targetList = macros[currentTab];
                const movedItem = targetList.splice(dragSrcIndex, 1)[0];
                targetList.splice(targetIndex, 0, movedItem);
                save();
                renderMacros();
            }
        }

        function dragEnd() {
            this.classList.remove('dragging');
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            const notice = document.createElement('div');
            notice.style = "position:fixed; top:20px; right:20px; background:#28a745; color:white; padding:10px 20px; border-radius:5px; z-index:9999;";
            notice.innerText = "복사 완료!";
            document.body.appendChild(notice);
            setTimeout(() => notice.remove(), 1000);
        }

        function addOrUpdateMacro() {
            const txt = document.getElementById('newText').value;
            if(!txt) return;
            if(editIndex === -1) {
                macros[currentTab].push(txt);
            } else {
                macros[currentTab][editIndex] = txt;
                editIndex = -1;
                document.getElementById('addBtn').innerText = "저장하기";
            }
            save(); renderMacros();
            document.getElementById('newText').value = '';
        }

        function editMacro(idx) {
            editIndex = idx;
            document.getElementById('newText').value = macros[currentTab][idx];
            document.getElementById('addBtn').innerText = "수정완료";
            document.getElementById('newText').focus();
        }

        function deleteMacro(idx) {
            if(confirm("이 문장을 삭제할까요?")) {
                macros[currentTab].splice(idx, 1);
                save(); renderMacros();
            }
        }

        function addTab() {
            const name = document.getElementById('newTabName').value;
            if(!name || macros[name]) return;
            macros[name] = [];
            categories.push(name);
            currentTab = name;
            save(); init();
            document.getElementById('newTabName').value = '';
        }

        function deleteCurrentTab() {
            if(categories.length <= 1) return;
            if(confirm(`[${currentTab}] 탭을 삭제할까요?`)) {
                delete macros[currentTab];
                categories = Object.keys(macros);
                currentTab = categories[0];
                save(); init();
            }
        }

        function save() { localStorage.setItem('br_macros_v4', JSON.stringify(macros)); }
        init();
    </script>
</body>
</html>
