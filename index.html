<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>블랙록 강노을 상담 대시보드 V7.3</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 15px; background: #121212; color: #e0e0e0; user-select: none; font-size: 14px; }
        h2 { font-size: 18px; margin: 0 0 10px 0; color: #007bff; display: flex; justify-content: space-between; align-items: center; }
        .save-status { font-size: 11px; color: #28a745; font-weight: normal; }
        
        .tab-bar { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
        .tab-btn { padding: 8px 15px; cursor: pointer; background: #333; border: none; color: white; border-radius: 4px; font-size: 12px; }
        .tab-btn.active { background: #007bff; font-weight: bold; }
        
        #searchBox { width: 100%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: #00ff00; border-radius: 4px; box-sizing: border-box; outline: none; font-size: 14px; }

        /* 본문 영역 최대로 넓힘 */
        .content-area { background: #1e1e1e; padding: 10px; border-radius: 8px; min-height: 500px; border: 1px solid #333; overflow-y: auto; max-height: 65vh; }
        
        .macro-item { display: flex; align-items: center; background: #2d2d2d; padding: 8px 12px; margin-bottom: 5px; border-radius: 4px; border: 1px solid #3a3a3a; transition: 0.2s; }
        .macro-item:hover { background: #353535; border-color: #007bff; }
        .macro-item.dragging { opacity: 0.5; border: 1px dashed #007bff; }
        
        /* 드래그 핸들을 작게 왼쪽 끝으로 밀어넣음 */
        .handle { color: #555; font-size: 14px; cursor: grab; padding: 5px; margin-right: 10px; }
        .num-tag { color: #888; font-weight: bold; margin-right: 10px; font-size: 12px; min-width: 25px; }
        
        /* 문장 본문: 별칭 칸이 없어져서 공간이 아주 넉넉함 */
        .macro-text { flex: 1; font-size: 14px; color: #fff; cursor: pointer; white-space: normal; line-height: 1.5; padding: 2px 0; word-break: break-all; }
        .macro-text:hover { color: #00ff00; }

        .btn-group { display: flex; gap: 5px; margin-left: 15px; }
        button { cursor: pointer; border: none; border-radius: 3px; padding: 5px 10px; font-size: 12px; font-weight: bold; }
        .edit-btn { background: #ffc107; color: black; }
        .del-btn { background: #dc3545; color: white; }
        
        .admin-panel { margin-top: 15px; padding: 15px; background: #252525; border-radius: 8px; border: 1px dashed #444; }
        input { padding: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 4px; font-size: 13px; margin-bottom: 5px; }
        .footer-btns { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        #toast { visibility: hidden; min-width: 100px; background-color: #28a745; color: #fff; text-align: center; border-radius: 4px; padding: 10px; position: fixed; z-index: 1000; right: 20px; top: 20px; font-weight: bold; }
        #toast.show { visibility: visible; animation: fadein 0.2s, fadeout 0.2s 0.6s; }
        @keyframes fadein { from {top:0; opacity:0;} to {top:20px; opacity:1;} }
        @keyframes fadeout { from {top:20px; opacity:1;} to {top:0; opacity:0;} }
    </style>
</head>
<body>

    <div id="toast">복사 완료!</div>

    <h2>🏦 BLACKROCK WIDE V7.3 <span class="save-status" id="saveStatus">● 자동 저장됨</span></h2>

    <input type="text" id="searchBox" placeholder="🔍 검색어 입력 시 해당 문장만 즉시 필터링됩니다..." onkeyup="renderMacros()">

    <div class="tab-bar" id="tabBar"></div>
    <div class="content-area" id="macroList"></div>

    <div class="admin-panel">
        <strong>[새 문장 등록]</strong><br>
        <input type="text" id="newText" style="width: 85%;" placeholder="여기에 상담 문장을 입력하세요... (별칭 없이 본문만 저장됩니다)">
        <button onclick="addOrUpdateMacro()" id="addBtn" style="background:#007bff; color:white; padding:10px 15px;">저장</button>
        <hr style="border:0.5px solid #333; margin:15px 0;">
        <strong>[관리]</strong> 
        <input type="text" id="newTabName" style="width:100px;" placeholder="탭 이름">
        <button onclick="addTab()" style="background:#555; color:white;">탭 추가</button>
        <button onclick="deleteCurrentTab()" style="background:#721c24; color:white;">탭 삭제</button>
        <div class="footer-btns">
            <button style="background:#28a745; color:white; padding:10px;" onclick="exportData()">📥 전체 데이터 백업</button>
            <button style="background:#6c757d; color:white; padding:10px;" onclick="document.getElementById('importFile').click()">📤 백업 불러오기</button>
            <input type="file" id="importFile" style="display:none" onchange="importData(this)">
        </div>
    </div>

    <script>
        let macros = JSON.parse(localStorage.getItem('br_v7_data')) || { "신규인사": [{t:"안녕하세요, 블랙록 강노을입니다."}] };
        let categories = Object.keys(macros);
        let currentTab = categories[0];
        let editIndex = -1;

        function init() {
            const tabBar = document.getElementById('tabBar');
            tabBar.innerHTML = categories.map(cat => `<button class="tab-btn ${cat === currentTab ? 'active' : ''}" onclick="setTab('${cat}')">${cat}</button>`).join('');
            renderMacros();
        }

        function setTab(cat) { currentTab = cat; editIndex = -1; document.getElementById('addBtn').innerText = "저장"; init(); }

        function renderMacros() {
            const list = document.getElementById('macroList');
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            list.innerHTML = "";
            (macros[currentTab] || []).forEach((itemData, idx) => {
                const text = itemData.t || "";
                if (text.toLowerCase().includes(searchTerm)) {
                    const item = document.createElement('div');
                    item.className = 'macro-item';
                    item.draggable = false;
                    item.dataset.index = idx;
                    item.innerHTML = `
                        <div class="handle">☰</div>
                        <div class="num-tag">${idx + 1}.</div>
                        <div class="macro-text" onclick="copyText('${text.replace(/'/g, "\\'")}')">${text}</div>
                        <div class="btn-group">
                            <button class="edit-btn" onclick="editMacro(${idx})">편집</button>
                            <button class="del-btn" onclick="deleteMacro(${idx})">삭제</button>
                        </div>
                    `;
                    const handle = item.querySelector('.handle');
                    handle.onmouseenter = () => item.draggable = true;
                    handle.onmouseleave = () => item.draggable = false;
                    item.addEventListener('dragstart', dragStart);
                    item.addEventListener('dragover', dragOver);
                    item.addEventListener('drop', drop);
                    list.appendChild(item);
                }
            });
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = ""; }, 800);
        }

        let dragSrcIndex;
        function dragStart(e) { dragSrcIndex = this.dataset.index; this.classList.add('dragging'); }
        function dragOver(e) { e.preventDefault(); }
        function drop(e) {
            const targetIndex = this.dataset.index;
            if (dragSrcIndex !== targetIndex) {
                const movedItem = macros[currentTab].splice(dragSrcIndex, 1)[0];
                macros[currentTab].splice(targetIndex, 0, movedItem);
                save(); renderMacros();
            }
        }

        function addOrUpdateMacro() {
            const txt = document.getElementById('newText').value;
            if(!txt) return;
            if(editIndex === -1) macros[currentTab].push({t: txt});
            else { macros[currentTab][editIndex] = {t: txt}; editIndex = -1; document.getElementById('addBtn').innerText = "저장"; }
            save(); renderMacros(); document.getElementById('newText').value = '';
            showStatus("저장 완료!");
        }

        function editMacro(idx) {
            editIndex = idx;
            document.getElementById('newText').value = macros[currentTab][idx].t;
            document.getElementById('addBtn').innerText = "수정 확정";
            document.getElementById('newText').focus();
        }

        function deleteMacro(idx) {
            if(confirm("이 문장을 삭제할까요?")) { macros[currentTab].splice(idx, 1); save(); renderMacros(); showStatus("삭제됨"); }
        }

        function addTab() {
            const name = document.getElementById('newTabName').value;
            if(!name || macros[name]) return;
            macros[name] = []; categories.push(name); currentTab = name; save(); init();
            document.getElementById('newTabName').value = '';
        }

        function deleteCurrentTab() {
            if(categories.length <= 1 || !confirm(`${currentTab} 삭제?`)) return;
            delete macros[currentTab]; categories = Object.keys(macros); currentTab = categories[0]; save(); init();
        }

        function exportData() {
            const dataStr = JSON.stringify(macros);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', 'blackrock_macro_backup.json');
            linkElement.click();
        }

        function importData(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function() {
                try { macros = JSON.parse(reader.result); categories = Object.keys(macros); currentTab = categories[0]; save(); init(); alert("복구 완료!"); }
                catch(e) { alert("파일 오류"); }
            };
            reader.readAsText(file);
        }

        function save() { localStorage.setItem('br_v7_data', JSON.stringify(macros)); }
        function showStatus(msg) {
            const status = document.getElementById('saveStatus');
            status.innerText = "● " + msg;
            setTimeout(() => { status.innerText = "● 자동 저장됨"; }, 2000);
        }
        init();
    </script>
</body>
</html>
