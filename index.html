<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BLACKROCK PRO V9.2</title>
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --item: #252525; --point: #007bff; --text: #e0e0e0; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: var(--text); user-select: none; }
        .header { display: flex; align-items: center; padding: 15px; background: var(--panel); border-bottom: 1px solid #333; gap: 10px; }
        .search-input { flex: 1; background: #000; border: 1px solid #444; color: #00ff00; padding: 10px; border-radius: 5px; outline: none; }
        .menu-btn { background: #444; color: white; border: none; padding: 10px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .menu-btn:hover { background: var(--point); }
        .btn-backup { background: #28a745; }
        .btn-restore { background: #ffc107; color: black; }

        .container { padding: 15px; height: calc(100vh - 85px); overflow-y: auto; }
        .tab-bar { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { padding: 8px 18px; background: #333; border: none; color: #aaa; cursor: pointer; border-radius: 5px; }
        .tab-btn.active { background: var(--point); color: white; font-weight: bold; }

        .macro-list { display: grid; grid-template-columns: 1fr; gap: 5px; }
        .macro-item { display: flex; align-items: center; background: var(--item); padding: 10px 15px; border-radius: 5px; border: 1px solid #2d2d2d; }
        .macro-item:hover { border-color: var(--point); background: #2d2d2d; }
        .handle { color: #555; cursor: grab; margin-right: 15px; font-size: 18px; }
        .num { color: #666; width: 30px; font-weight: bold; }
        .macro-content { flex: 1; cursor: pointer; font-size: 15px; line-height: 1.4; word-break: break-all; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--panel); padding: 25px; border-radius: 10px; width: 500px; border: 1px solid #444; }
        .modal h3 { margin-top: 0; color: var(--point); }
        .modal textarea, .modal input { width: 100%; background: #000; border: 1px solid #444; color: white; padding: 12px; border-radius: 5px; box-sizing: border-box; margin-bottom: 15px; font-size: 14px; }
        .modal-btns { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--point); color: white; }
        .btn-close { background: #555; color: white; }

        #toast { visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #28a745; color: white; padding: 10px 25px; border-radius: 30px; font-size: 14px; z-index: 2000; }
        #toast.show { visibility: visible; animation: fadein 0.2s, fadeout 0.2s 0.7s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div id="toast">복사 완료!</div>

<div class="header">
    <input type="text" id="searchBox" class="search-input" placeholder="🔍 검색어 입력..." onkeyup="render()">
    <button class="menu-btn" onclick="openModal('addModal')">+ 추가</button>
    <button class="menu-btn" onclick="openModal('tabModal')">⚙️ 탭 관리</button>
    <button class="menu-btn btn-backup" onclick="exportData()">📥 백업(저장)</button>
    <button class="menu-btn btn-restore" onclick="document.getElementById('importFile').click()">📤 복원(불러오기)</button>
    <input type="file" id="importFile" style="display:none" onchange="importData(this)">
</div>

<div class="container">
    <div class="tab-bar" id="tabBar"></div>
    <div class="macro-list" id="list"></div>
</div>

<div id="addModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">새 문장 등록</h3>
        <textarea id="inpText" rows="6" placeholder="상담 문장을 입력하세요..."></textarea>
        <div class="modal-btns">
            <button class="btn btn-save" onclick="saveItem()">저장하기</button>
            <button class="btn btn-close" onclick="closeModal('addModal')">닫기</button>
        </div>
    </div>
</div>

<div id="tabModal" class="modal">
    <div class="modal-content">
        <h3>탭 설정</h3>
        <input type="text" id="newTabName" placeholder="새 탭 이름 입력">
        <button class="btn btn-save" style="margin-bottom:10px;" onclick="addTab()">탭 추가</button>
        <button class="btn btn-close" style="background:#721c24; width:100%;" onclick="delTab()">현재 선택된 탭 삭제</button>
        <div style="margin-top:20px;"><button class="btn btn-close" style="width:100%;" onclick="closeModal('tabModal')">닫기</button></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('br_v9')) || { "인사": [{t:"안녕하세요, 블랙록 강노을입니다."}] };
    let curTab = Object.keys(db)[0];
    let editIdx = -1;

    function render() {
        const list = document.getElementById('list');
        const tabBar = document.getElementById('tabBar');
        const search = document.getElementById('searchBox').value.toLowerCase();
        
        // 탭 바 렌더링 (중복 방지: Object.keys(db)를 직접 사용)
        tabBar.innerHTML = Object.keys(db).map(t => 
            `<button class="tab-btn ${t===curTab?'active':''}" onclick="setTab('${t}')">${t}</button>`
        ).join('');
        
        list.innerHTML = "";
        (db[curTab] || []).forEach((item, i) => {
            if(item.t.toLowerCase().includes(search)) {
                const div = document.createElement('div');
                div.className = 'macro-item';
                div.draggable = true;
                div.innerHTML = `
                    <div class="handle">☰</div>
                    <div class="num">${i+1}.</div>
                    <div class="macro-content" onclick="copy('${item.t.replace(/'/g, "\\'")}')">${item.t}</div>
                    <button onclick="delItem(${i})" style="background:none; border:none; color:#555; cursor:pointer;">삭제</button>
                `;
                div.ondblclick = () => { editIdx = i; document.getElementById('inpText').value = item.t; document.getElementById('modalTitle').innerText="문장 수정"; openModal('addModal'); };
                div.addEventListener('dragstart', (e) => { e.dataTransfer.setData('idx', i); div.style.opacity = '0.4'; });
                div.addEventListener('dragover', (e) => e.preventDefault());
                div.addEventListener('drop', (e) => {
                    const from = e.dataTransfer.getData('idx');
                    const target = db[curTab].splice(from, 1)[0];
                    db[curTab].splice(i, 0, target);
                    saveDB(); render();
                });
                div.addEventListener('dragend', () => render());
                list.appendChild(div);
            }
        });
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; editIdx = -1; document.getElementById('inpText').value = ""; document.getElementById('modalTitle').innerText="새 문장 등록"; }
    function setTab(t) { curTab = t; render(); }
    function copy(t) { navigator.clipboard.writeText(t); const ts = document.getElementById('toast'); ts.className = 'show'; setTimeout(()=>ts.className='', 1000); }
    
    function saveItem() {
        const t = document.getElementById('inpText').value;
        if(!t) return;
        if(editIdx === -1) db[curTab].push({t:t});
        else db[curTab][editIdx].t = t;
        saveDB(); render(); closeModal('addModal');
    }

    function delItem(i) { if(confirm("삭제할까요?")) { db[curTab].splice(i, 1); saveDB(); render(); } }

    // 탭 추가 로직 수정 (중복 생성 버그 해결)
    function addTab() {
        const n = document.getElementById('newTabName').value.trim();
        if(n && !db[n]) {
            db[n] = []; 
            curTab = n; 
            saveDB(); 
            render(); 
            document.getElementById('newTabName').value=""; 
            closeModal('tabModal');
        } else if(db[n]) {
            alert("이미 존재하는 탭 이름입니다.");
        }
    }

    function delTab() {
        const tabs = Object.keys(db);
        if(tabs.length > 1 && confirm("탭을 삭제할까요?")) {
            delete db[curTab];
            curTab = Object.keys(db)[0];
            saveDB(); render(); closeModal('tabModal');
        } else if(tabs.length <= 1) {
            alert("최소 하나의 탭은 있어야 합니다.");
        }
    }

    function saveDB() { localStorage.setItem('br_v9', JSON.stringify(db)); }
    function exportData() { const blob = new Blob([JSON.stringify(db)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'blackrock_macro.json'; a.click(); }
    function importData(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function() {
            try {
                const importedData = JSON.parse(reader.result);
                if(confirm("데이터를 복원할까요?")) {
                    db = importedData;
                    curTab = Object.keys(db)[0];
                    saveDB(); render(); alert("복구 완료!");
                }
            } catch(e) { alert("파일 오류"); }
        };
        reader.readAsText(file);
    }
    
    render();
</script>
</body>
</html>
