<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>블랙록 강노을 상담 대시보드 V6</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 15px; background: #121212; color: #e0e0e0; user-select: none; font-size: 13px; }
        h2 { font-size: 18px; margin-top: 0; color: #007bff; }
        .tab-bar { display: flex; gap: 4px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { padding: 6px 12px; cursor: pointer; background: #333; border: none; color: white; border-radius: 4px; font-size: 12px; }
        .tab-btn.active { background: #007bff; font-weight: bold; }
        
        .content-area { background: #1e1e1e; padding: 10px; border-radius: 8px; min-height: 450px; border: 1px solid #333; }
        
        /* 콤팩트한 아이템 스타일 */
        .macro-item { display: flex; align-items: center; background: #2d2d2d; padding: 6px 10px; margin-bottom: 4px; border-radius: 4px; border: 1px solid #3a3a3a; cursor: grab; }
        .macro-item:hover { background: #383838; border-color: #555; }
        .macro-item.dragging { opacity: 0.5; background: #444; border: 1px dashed #007bff; }
        
        .num-tag { color: #888; font-weight: bold; margin-right: 10px; width: 25px; text-align: right; font-family: monospace; }
        .handle { margin-right: 10px; color: #555; font-size: 16px; }
        .macro-text { flex: 1; padding: 2px 0; font-size: 13px; color: #fff; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .btn-group { display: flex; gap: 4px; margin-left: 10px; }
        button { cursor: pointer; border: none; border-radius: 3px; padding: 4px 8px; font-weight: bold; font-size: 11px; }
        .edit-btn { background: #ffc107; color: black; }
        .del-btn { background: #dc3545; color: white; }
        
        .admin-panel { margin-top: 15px; padding: 12px; background: #252525; border-radius: 8px; border: 1px dashed #444; }
        input { padding: 8px; background: #333; border: 1px solid #444; color: white; border-radius: 4px; font-size: 12px; }
        hr { border: 0.5px solid #333; margin: 12px 0; }

        #toast {
            visibility: hidden; min-width: 120px; background-color: #28a745; color: #fff; text-align: center;
            border-radius: 4px; padding: 8px; position: fixed; z-index: 1000; right: 20px; top: 20px; font-size: 12px;
        }
        #toast.show { visibility: visible; animation: fadein 0.2s, fadeout 0.2s 0.6s; }
        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 20px; opacity: 1;} }
        @keyframes fadeout { from {top: 20px; opacity: 1;} to {top: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div id="toast">복사 완료!</div>

    <h2>🏦 BLACKROCK 상담 보드 V6</h2>

    <div class="tab-bar" id="tabBar"></div>
    <div class="content-area" id="macroList"></div>

    <div class="admin-panel">
        <strong>[탭]</strong> 
        <input type="text" id="newTabName" style="width:100px;" placeholder="새 이름">
        <button onclick="addTab()" style="background:#555; color:white;">추가</button>
        <button onclick="deleteCurrentTab()" style="background:#721c24; color:white;">삭제</button>
        <hr>
        <strong>[등록/수정]</strong>
        <input type="text" id="newText" style="width: 65%;" placeholder="문장을 입력하세요...">
        <button onclick="addOrUpdateMacro()" id="addBtn" style="background:#007bff; color:white;">저장</button>
    </div>

    <script>
        let macros = JSON.parse(localStorage.getItem('br_macros_v6')) || { "신규인사": ["안녕하세요, 블랙록 강노을입니다."] };
        let categories = Object.keys(macros);
        let currentTab = categories[0];
        let editIndex = -1;

        function init() {
            const tabBar = document.getElementById('tabBar');
            tabBar.innerHTML = categories.map(cat => 
                `<button class="tab-btn ${cat === currentTab ? 'active' : ''}" onclick="setTab('${cat}')">${cat}</button>`
            ).join('');
            renderMacros();
        }

        function setTab(cat) { currentTab = cat; editIndex = -1; document.getElementById('addBtn').innerText = "저장"; init(); }

        function renderMacros() {
            const list = document.getElementById('macroList');
            list.innerHTML = "";
            (macros[currentTab] || []).forEach((text, idx) => {
                const item = document.createElement('div');
                item.className = 'macro-item';
                item.draggable = true;
                item.dataset.index = idx;
                item.innerHTML = `
                    <div class="handle">☰</div>
                    <div class="num-tag">${idx + 1}.</div>
                    <div class="macro-text" onclick="copyText('${text.replace(/'/g, "\\'")}')">${text}</div>
                    <div class="btn-group">
                        <button class="edit-btn" onclick="editMacro(${idx})">편집</button>
                        <button class="del-btn" onclick="deleteMacro(${idx})">삭제</button>
                    </div>
                `;
                item.addEventListener('dragstart', dragStart);
                item.addEventListener('dragover', dragOver);
                item.addEventListener('drop', drop);
                item.addEventListener('dragend', dragEnd);
                list.appendChild(item);
            });
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 800);
        }

        let dragSrcIndex;
        function dragStart(e) { dragSrcIndex = this.dataset.index; this.classList.add('dragging'); }
        function dragOver(e) { e.preventDefault(); }
        function drop(e) {
            const targetIndex = this.dataset.index;
            if (dragSrcIndex !== targetIndex) {
                const movedItem = macros[currentTab].splice(dragSrcIndex, 1)[0];
                macros[currentTab].splice(targetIndex, 0, movedItem);
                save(); renderMacros();
            }
        }
        function dragEnd() { this.classList.remove('dragging'); }

        function addOrUpdateMacro() {
            const txt = document.getElementById('newText').value;
            if(!txt) return;
            if(editIndex === -1) { macros[currentTab].push(txt); } 
            else { macros[currentTab][editIndex] = txt; editIndex = -1; document.getElementById('addBtn').innerText = "저장"; }
            save(); renderMacros(); document.getElementById('newText').value = '';
        }

        function editMacro(idx) {
            editIndex = idx;
            document.getElementById('newText').value = macros[currentTab][idx];
            document.getElementById('addBtn').innerText = "수정";
            document.getElementById('newText').focus();
        }

        function deleteMacro(idx) {
            if(confirm("삭제?")) {
                macros[currentTab].splice(idx, 1);
                save(); renderMacros();
            }
        }

        function addTab() {
            const name = document.getElementById('newTabName').value;
            if(!name || macros[name]) return;
            macros[name] = []; categories.push(name); currentTab = name; save(); init();
            document.getElementById('newTabName').value = '';
        }

        function deleteCurrentTab() {
            if(categories.length <= 1 || !confirm(`[${currentTab}] 삭제?`)) return;
            delete macros[currentTab]; categories = Object.keys(macros); currentTab = categories[0]; save(); init();
        }

        function save() { localStorage.setItem('br_macros_v6', JSON.stringify(macros)); }
        init();
    </script>
</body>
</html>
