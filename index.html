<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BLACKROCK ULTIMATE V8</title>
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --item: #252525; --point: #007bff; --text: #e0e0e0; }
        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; margin: 0; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* 왼쪽: 메인 상담 영역 */
        .main-container { flex: 1; display: flex; flex-direction: column; padding: 15px; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .search-input { flex: 1; background: #222; border: 1px solid #333; color: #00ff00; padding: 10px; border-radius: 5px; outline: none; margin-right: 10px; }
        
        .tab-bar { display: flex; gap: 4px; margin-bottom: 10px; overflow-x: auto; white-space: nowrap; padding-bottom: 5px; }
        .tab-btn { padding: 6px 15px; background: #333; border: none; color: #aaa; cursor: pointer; border-radius: 4px; font-size: 12px; }
        .tab-btn.active { background: var(--point); color: white; font-weight: bold; }

        .list-area { flex: 1; overflow-y: auto; background: var(--panel); border-radius: 8px; border: 1px solid #333; padding: 5px; }
        .macro-item { display: flex; align-items: center; background: var(--item); padding: 4px 10px; margin-bottom: 2px; border-radius: 3px; border: 1px solid #2d2d2d; font-size: 13px; }
        .macro-item:hover { background: #333; border-color: var(--point); }
        .handle { color: #444; cursor: grab; padding: 5px; margin-right: 8px; }
        .num { color: #666; width: 25px; font-size: 11px; }
        .macro-content { flex: 1; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 5px 0; }
        .macro-content:active { color: var(--point); }

        /* 오른쪽: 관리 패널 (슬림) */
        .side-panel { width: 280px; background: var(--panel); border-left: 1px solid #333; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .side-panel h3 { font-size: 14px; margin: 0; color: var(--point); }
        .side-panel input, .side-panel textarea { width: 100%; background: #222; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; box-sizing: border-box; font-size: 12px; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; margin-bottom: 5px; }
        .btn-blue { background: var(--point); color: white; }
        .btn-gray { background: #444; color: white; }
        .btn-red { background: #721c24; color: white; }

        #toast { visibility: hidden; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #28a745; color: white; padding: 8px 20px; border-radius: 20px; font-size: 12px; font-weight: bold; z-index: 1000; }
        #toast.show { visibility: visible; animation: fadein 0.2s, fadeout 0.2s 0.8s; }
        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 20px; opacity: 1;} }
        @keyframes fadeout { from {top: 20px; opacity: 1;} to {top: 0; opacity: 0;} }
    </style>
</head>
<body>

<div id="toast">복사완료</div>

<div class="main-container">
    <div class="header">
        <input type="text" id="searchBox" class="search-input" placeholder="🔍 검색어를 입력하면 즉시 필터링됩니다..." onkeyup="render()">
        <div id="saveStat" style="font-size:11px; color:#555;">● 실시간 저장 중</div>
    </div>
    
    <div class="tab-bar" id="tabBar"></div>
    <div class="list-area" id="list"></div>
</div>

<div class="side-panel">
    <h3>[ 문장 등록/수정 ]</h3>
    <textarea id="inpText" rows="4" placeholder="상담 문장 입력..."></textarea>
    <button class="btn btn-blue" id="saveBtn" onclick="saveItem()">저장하기</button>
    <button class="btn btn-gray" style="display:none;" id="cancelBtn" onclick="resetForm()">취소</button>
    
    <hr style="border:0.1px solid #333; width:100%;">
    
    <h3>[ 탭 관리 ]</h3>
    <input type="text" id="newTab" placeholder="새 탭 이름">
    <button class="btn btn-gray" onclick="addTab()">탭 추가</button>
    <button class="btn btn-red" onclick="delTab()">현재 탭 삭제</button>

    <div style="margin-top: auto;">
        <button class="btn btn-gray" onclick="exportData()">📥 전체 데이터 백업</button>
        <button class="btn btn-gray" onclick="document.getElementById('fileInp').click()">📤 불러오기</button>
        <input type="file" id="fileInp" style="display:none" onchange="importData(this)">
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('br_v8')) || { "인사": [{t:"안녕하세요, 블랙록 강노을입니다."}], "압박": [] };
    let tabs = Object.keys(db);
    let curTab = tabs[0];
    let editIdx = -1;

    function render() {
        const list = document.getElementById('list');
        const search = document.getElementById('searchBox').value.toLowerCase();
        document.getElementById('tabBar').innerHTML = tabs.map(t => `<button class="tab-btn ${t===curTab?'active':''}" onclick="setTab('${t}')">${t}</button>`).join('');
        
        list.innerHTML = "";
        db[curTab].forEach((item, i) => {
            if(item.t.toLowerCase().includes(search)) {
                const div = document.createElement('div');
                div.className = 'macro-item';
                div.draggable = true;
                div.innerHTML = `
                    <div class="handle">☰</div>
                    <div class="num">${i+1}</div>
                    <div class="macro-content" onclick="copy('${item.t.replace(/'/g, "\\'")}')" ondblclick="edit(${i})">${item.t}</div>
                    <button class="btn-red" style="padding:2px 5px; font-size:10px; border-radius:3px; margin-left:5px;" onclick="delItem(${i})">삭제</button>
                `;
                div.addEventListener('dragstart', (e) => { e.dataTransfer.setData('idx', i); div.style.opacity = '0.4'; });
                div.addEventListener('dragover', (e) => e.preventDefault());
                div.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const from = e.dataTransfer.getData('idx');
                    const target = db[curTab].splice(from, 1)[0];
                    db[curTab].splice(i, 0, target);
                    saveDB(); render();
                });
                div.addEventListener('dragend', () => render());
                list.appendChild(div);
            }
        });
    }

    function setTab(t) { curTab = t; resetForm(); render(); }
    function copy(t) { navigator.clipboard.writeText(t); const ts = document.getElementById('toast'); ts.className = 'show'; setTimeout(()=>ts.className='', 1000); }
    function saveItem() {
        const t = document.getElementById('inpText').value;
        if(!t) return;
        if(editIdx === -1) db[curTab].push({t:t});
        else { db[curTab][editIdx].t = t; editIdx = -1; }
        saveDB(); render(); resetForm();
    }
    function edit(i) {
        editIdx = i;
        document.getElementById('inpText').value = db[curTab][i].t;
        document.getElementById('saveBtn').innerText = "수정 확정";
        document.getElementById('cancelBtn').style.display = "block";
        document.getElementById('inpText').focus();
    }
    function delItem(i) { if(confirm("삭제하시겠습니까?")) { db[curTab].splice(i, 1); saveDB(); render(); } }
    function resetForm() { document.getElementById('inpText').value = ""; editIdx = -1; document.getElementById('saveBtn').innerText = "저장하기"; document.getElementById('cancelBtn').style.display = "none"; }
    function addTab() { const n = document.getElementById('newTab').value; if(n && !db[n]) { db[n] = []; tabs.push(n); curTab = n; saveDB(); render(); document.getElementById('newTab').value=""; } }
    function delTab() { if(tabs.length > 1 && confirm("탭을 삭제하시겠습니까?")) { delete db[curTab]; tabs = Object.keys(db); curTab = tabs[0]; saveDB(); render(); } }
    function saveDB() { localStorage.setItem('br_v8', JSON.stringify(db)); }
    function exportData() { const blob = new Blob([JSON.stringify(db)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'blackrock_v8.json'; a.click(); }
    function importData(inp) { const r = new FileReader(); r.onload = () => { db = JSON.parse(r.result); tabs = Object.keys(db); curTab = tabs[0]; saveDB(); render(); }; r.readAsText(inp.files[0]); }
    
    render();
</script>
</body>
</html>
