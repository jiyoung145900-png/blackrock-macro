<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BLACKROCK PRO V10.0</title>
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --item: #252525; --point: #007bff; --text: #e0e0e0; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background: var(--bg); color: var(--text); user-select: none; overflow: hidden; }
        
        /* 헤더 디자인 최적화 */
        .header { display: flex; align-items: center; padding: 10px 15px; background: var(--panel); border-bottom: 1px solid #333; gap: 10px; }
        .search-input { flex: 1; background: #000; border: 1px solid #444; color: #00ff00; padding: 8px 12px; border-radius: 4px; outline: none; font-size: 13px; }
        .btn-group { display: flex; gap: 5px; }
        .menu-btn { background: #333; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .btn-main { background: var(--point) !important; font-size: 18px !important; padding: 5px 15px !important; }
        .menu-btn:hover { background: #444; }

        /* 컨테이너 및 리스트 */
        .container { padding: 15px; height: calc(100vh - 65px); overflow-y: auto; }
        .tab-bar { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { padding: 8px 16px; background: #2a2a2a; border: none; color: #888; cursor: pointer; border-radius: 4px; font-size: 13px; }
        .tab-btn.active { background: var(--point); color: white; font-weight: bold; box-shadow: 0 0 10px rgba(0,123,255,0.4); }

        .macro-list { display: grid; grid-template-columns: 1fr; gap: 5px; }
        .macro-item { display: flex; align-items: center; background: var(--item); padding: 12px 18px; border-radius: 5px; border: 1px solid #2d2d2d; outline: none; transition: 0.1s; }
        .macro-item:hover { border-color: var(--point); background: #2a2a2a; }
        .macro-item:focus { border-color: #ffc107; background: #333; }
        .handle { color: #444; cursor: grab; margin-right: 15px; font-size: 20px; }
        .num { color: #555; width: 30px; font-weight: bold; font-size: 12px; }
        .macro-content { flex: 1; cursor: pointer; font-size: 15px; line-height: 1.5; letter-spacing: -0.3px; }

        /* 팝업 모달 디자인 */
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 5000; align-items: center; justify-content: center; }
        .modal { background: #1e1e1e; padding: 20px; border-radius: 8px; width: 400px; border: 1px solid var(--point); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-title { margin-bottom: 15px; font-weight: bold; color: var(--point); font-size: 16px; }
        .modal-input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 4px; outline: none; font-size: 14px; box-sizing: border-box; margin-bottom: 15px; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 10px; }

        /* 우클릭 메뉴 & 토스트 */
        #contextMenu { display: none; position: fixed; background: #2a2a2a; border: 1px solid #444; z-index: 2000; border-radius: 6px; padding: 5px 0; box-shadow: 0 4px 15px rgba(0,0,0,0.6); min-width: 140px; }
        #contextMenu div { padding: 12px 20px; cursor: pointer; font-size: 13px; color: white; }
        #contextMenu div:hover { background: var(--point); }
        #toast { visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #28a745; color: white; padding: 10px 25px; border-radius: 30px; font-size: 13px; z-index: 6000; }
        #toast.show { visibility: visible; animation: fadein 0.2s, fadeout 0.2s 0.7s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div id="toast">복사 완료!</div>
<div id="contextMenu"></div>

<div id="modalOverlay">
    <div class="modal">
        <div class="modal-title" id="modalTitle">새 문장 추가</div>
        <textarea id="modalInp" class="modal-input" rows="4" placeholder="내용을 입력하세요..."></textarea>
        <div class="modal-btns">
            <button class="menu-btn" onclick="closeModal()">취소</button>
            <button class="menu-btn btn-main" style="font-size: 14px !important;" onclick="saveItem()">확인</button>
        </div>
    </div>
</div>

<div class="header">
    <input type="text" id="searchBox" class="search-input" placeholder="🔍 검색어..." onkeyup="render()">
    <div class="btn-group">
        <button class="menu-btn btn-main" onclick="openModal()">+</button>
        <button class="menu-btn" onclick="exportData()">저장</button>
        <button class="menu-btn" onclick="document.getElementById('importFile').click()">복원</button>
    </div>
    <input type="file" id="importFile" style="display:none" onchange="importData(this)">
</div>

<div class="container">
    <div class="tab-bar" id="tabBar"></div>
    <div class="macro-list" id="list"></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('br_v10')) || { "인사": [{t:"안녕하세요, 블랙록 강노을입니다."}] };
    let curTab = Object.keys(db)[0];
    let editIdx = -1;
    let rightClickedTab = "";

    function render() {
        const list = document.getElementById('list');
        const tabBar = document.getElementById('tabBar');
        const search = document.getElementById('searchBox').value.toLowerCase();
        
        tabBar.innerHTML = Object.keys(db).map(t => 
            `<button class="tab-btn ${t===curTab?'active':''}" onclick="setTab('${t}')" oncontextmenu="showTabMenu(event, '${t}')">${t}</button>`
        ).join('');
        
        list.innerHTML = "";
        (db[curTab] || []).forEach((item, i) => {
            if(item.t.toLowerCase().includes(search)) {
                const div = document.createElement('div');
                div.className = 'macro-item';
                div.tabIndex = 0;
                div.draggable = true;
                div.oncontextmenu = (e) => showItemMenu(e, i);
                div.onclick = () => copy(item.t);
                div.onkeydown = (e) => { if (e.key === "Delete" || e.key === "Del") delItem(i); };
                div.ondblclick = () => openModal(i); // 더블클릭 시 수정 팝업

                div.innerHTML = `
                    <div class="handle">☰</div>
                    <div class="num">${i+1}.</div>
                    <div class="macro-content">${item.t}</div>
                `;
                
                div.addEventListener('dragstart', (e) => { e.dataTransfer.setData('idx', i); div.style.opacity = '0.4'; });
                div.addEventListener('dragover', (e) => e.preventDefault());
                div.addEventListener('drop', (e) => {
                    const from = e.dataTransfer.getData('idx');
                    const target = db[curTab].splice(from, 1)[0];
                    db[curTab].splice(i, 0, target);
                    saveDB(); render();
                });
                div.addEventListener('dragend', () => render());
                list.appendChild(div);
            }
        });
    }

    // --- 팝업 로직 ---
    function openModal(idx = -1) {
        editIdx = idx;
        const overlay = document.getElementById('modalOverlay');
        const title = document.getElementById('modalTitle');
        const input = document.getElementById('modalInp');
        
        overlay.style.display = 'flex';
        if(idx === -1) {
            title.innerText = "새 문장 추가";
            input.value = "";
        } else {
            title.innerText = "문장 수정";
            input.value = db[curTab][idx].t;
        }
        input.focus();
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
        editIdx = -1;
    }

    function saveItem() {
        const t = document.getElementById('modalInp').value.trim();
        if(!t) return;
        if(editIdx === -1) db[curTab].push({t:t});
        else db[curTab][editIdx].t = t;
        saveDB(); render(); closeModal();
    }

    // 엔터키 저장 (팝업 안에서)
    document.getElementById('modalInp').addEventListener('keydown', (e) => {
        if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveItem(); }
    });

    function copy(t) {
        const cleanText = t.trim().replace(/[\x00-\x1F\x7F-\x9F]/g, "");
        navigator.clipboard.writeText(cleanText).then(() => {
            const ts = document.getElementById('toast');
            ts.className = 'show';
            setTimeout(() => ts.className = '', 1000);
        });
    }

    // 우클릭 메뉴들
    function showTabMenu(e, tabName) {
        e.preventDefault(); e.stopPropagation();
        rightClickedTab = tabName;
        const menu = document.getElementById('contextMenu');
        menu.innerHTML = `<div onclick="addTabPrompt()">➕ 새 탭 추가</div><div onclick="editTabPrompt()">📝 이름 수정</div><div onclick="delTabConfirm()" style="color:#ff6b6b">❌ 삭제</div>`;
        displayMenu(e);
    }
    function showItemMenu(e, idx) {
        e.preventDefault(); e.stopPropagation();
        const menu = document.getElementById('contextMenu');
        menu.innerHTML = `<div onclick="openModal(${idx})">📝 수정</div><div onclick="delItem(${idx})" style="color:#ff6b6b">❌ 삭제 (Del)</div>`;
        displayMenu(e);
    }
    function displayMenu(e) {
        const menu = document.getElementById('contextMenu');
        menu.style.display = 'block'; menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
    }
    window.onclick = () => document.getElementById('contextMenu').style.display = 'none';

    function addTabPrompt() {
        const n = prompt("새 탭 이름?");
        if(n && !db[n]) { db[n] = []; curTab = n; saveDB(); render(); }
    }
    function editTabPrompt() {
        const n = prompt("이름 수정?", rightClickedTab);
        if(n && n !== rightClickedTab && !db[n]) { db[n] = db[rightClickedTab]; delete db[rightClickedTab]; curTab = n; saveDB(); render(); }
    }
    function delTabConfirm() {
        if(Object.keys(db).length > 1 && confirm(`탭 삭제할까요?`)) { delete db[rightClickedTab]; curTab = Object.keys(db)[0]; saveDB(); render(); }
    }
    function setTab(t) { curTab = t; render(); }
    function delItem(i) { if(confirm("삭제할까요?")) { db[curTab].splice(i, 1); saveDB(); render(); } }
    function saveDB() { localStorage.setItem('br_v10', JSON.stringify(db)); }
    function exportData() {
        const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'blackrock_v10.json'; a.click();
    }
    function importData(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function() {
            try {
                const importedData = JSON.parse(reader.result);
                if(confirm("데이터를 합칠까요?")) {
                    for(let k in importedData) { if(db[k]) db[k] = db[k].concat(importedData[k]); else db[k] = importedData[k]; }
                    saveDB(); render();
                }
            } catch(e) { alert("오류"); }
        };
        reader.readAsText(file);
    }
    render();
</script>
</body>
</html>
