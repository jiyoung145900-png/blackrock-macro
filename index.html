<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>블랙록 강노을 상담 대시보드 V2</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; background: #121212; color: #e0e0e0; }
        .tab-bar { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; cursor: pointer; background: #333; border: none; color: white; border-radius: 5px; }
        .tab-btn.active { background: #007bff; font-weight: bold; }
        .content-area { background: #1e1e1e; padding: 20px; border-radius: 10px; min-height: 300px; border: 1px solid #333; }
        .macro-item { display: flex; justify-content: space-between; align-items: center; background: #2d2d2d; padding: 12px; margin-bottom: 8px; border-radius: 5px; }
        .btn-group { display: flex; gap: 5px; }
        button { cursor: pointer; border: none; border-radius: 3px; padding: 6px 12px; font-weight: bold; }
        .copy-btn { background: #28a745; color: white; }
        .del-btn { background: #dc3545; color: white; }
        .admin-panel { margin-top: 25px; padding: 15px; background: #252525; border-radius: 10px; border: 1px dashed #555; }
        input { padding: 8px; background: #333; border: 1px solid #444; color: white; margin-right: 5px; }
    </style>
</head>
<body>

    <h2>💰 BLACKROCK 강노을 실전 매크로</h2>

    <div class="tab-bar" id="tabBar"></div>

    <div class="content-area" id="macroList"></div>

    <div class="admin-panel">
        <strong>[탭 편집]</strong> 
        <input type="text" id="newTabName" placeholder="새 탭 이름">
        <button onclick="addTab()" style="background:#555; color:white;">탭 추가</button>
        <button onclick="deleteCurrentTab()" style="background:#721c24; color:white;">현재 탭 삭제</button>
        <hr style="border:0.5px solid #444; margin:15px 0;">
        <strong>[문장 편집]</strong>
        <input type="text" id="newText" style="width: 60%;" placeholder="선택된 탭에 넣을 문장 입력...">
        <button onclick="addMacro()" style="background:#007bff; color:white;">문장 추가</button>
    </div>

    <script>
        let macros = JSON.parse(localStorage.getItem('br_macros')) || { "신규인사": ["안녕하세요, 블랙록 강노을입니다."] };
        let categories = Object.keys(macros);
        let currentTab = categories[0];

        function init() {
            const tabBar = document.getElementById('tabBar');
            tabBar.innerHTML = categories.map(cat => 
                `<button class="tab-btn ${cat === currentTab ? 'active' : ''}" onclick="setTab('${cat}')">${cat}</button>`
            ).join('');
            renderMacros();
        }

        function setTab(cat) { currentTab = cat; init(); }

        function renderMacros() {
            const list = document.getElementById('macroList');
            list.innerHTML = (macros[currentTab] || []).map((text, idx) => `
                <div class="macro-item">
                    <span>${text}</span>
                    <div class="btn-group">
                        <button class="copy-btn" onclick="copyText('${text}')">복사 & 카톡전송</button>
                        <button class="del-btn" onclick="deleteMacro(${idx})">삭제</button>
                    </div>
                </div>
            `).join('');
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            // 오토핫키가 감지할 수 있도록 짧은 알림창 대신 타이틀을 살짝 바꿉니다.
            document.title = "COPIED";
            setTimeout(() => { document.title = "블랙록 강노을 상담 대시보드 V2"; }, 500);
        }

        function addTab() {
            const name = document.getElementById('newTabName').value;
            if(!name || macros[name]) return;
            macros[name] = [];
            categories.push(name);
            currentTab = name;
            save(); init();
        }

        function deleteCurrentTab() {
            if(confirm(`[${currentTab}] 탭과 모든 문장을 삭제할까요?`)) {
                delete macros[currentTab];
                categories = Object.keys(macros);
                currentTab = categories[0];
                save(); init();
            }
        }

        function addMacro() {
            const txt = document.getElementById('newText').value;
            if(!txt) return;
            macros[currentTab].push(txt);
            save(); renderMacros();
            document.getElementById('newText').value = '';
        }

        function deleteMacro(idx) {
            macros[currentTab].splice(idx, 1);
            save(); renderMacros();
        }

        function save() { localStorage.setItem('br_macros', JSON.stringify(macros)); }
        init();
    </script>
</body>
</html>
